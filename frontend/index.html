<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Flag Explorer</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌍 Flag Explorer</h1>
        <p>Explore países e aprenda suas bandeiras</p>
    </header>

    <main>
        <button id="exploreBtn">Explorar Países</button>

        <div id="map"></div>

        <div id="countryInfo">
            <h2 id="countryName"></h2>
            <img id="countryFlag" />
            <p id="countryDetails"></p>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
